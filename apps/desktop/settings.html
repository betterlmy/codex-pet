<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-pet 设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <header class="page-header">
        <h1>AI 设置</h1>
        <p>连接模型，并为常用操作设置全局快捷键。</p>
      </header>

      <section class="settings-group" aria-labelledby="appearance-title">
        <div class="group-heading">
          <h2 id="appearance-title">桌宠外观</h2>
          <p>减少宠物遮挡当前操作内容。</p>
        </div>
        <div class="group-body appearance-body">
          <label class="switch-row">
            <span>
              <strong>鼠标悬停时半隐藏</strong>
              <small>开启后将自动关闭点击穿透，两项功能不能同时使用。</small>
            </span>
            <input id="hover-fade-enabled" type="checkbox" role="switch" />
          </label>
          <label class="opacity-row" for="hover-opacity">
            <span>
              <strong>悬停透明度</strong>
              <small>鼠标移开后会自动恢复完全显示。</small>
            </span>
            <span class="range-control">
              <input id="hover-opacity" type="range" min="10" max="90" step="5" value="35" />
              <output id="hover-opacity-value" for="hover-opacity">35%</output>
            </span>
          </label>
        </div>
      </section>

      <section class="settings-group" aria-labelledby="connection-title">
        <div class="group-heading">
          <h2 id="connection-title">模型连接</h2>
          <p>支持 OpenAI Chat Completions 兼容服务。</p>
        </div>
        <div class="group-body connection-fields">
          <label class="field field-wide">
            <span>服务地址</span>
            <input id="base-url" type="url" spellcheck="false" autocomplete="off" />
          </label>
          <label class="field">
            <span>模型</span>
            <input id="model" type="text" spellcheck="false" autocomplete="off" />
          </label>
          <label class="field">
            <span>API Key</span>
            <input id="api-key" type="password" spellcheck="false" autocomplete="new-password" />
          </label>
          <div class="field-wide secret-row">
            <span id="secret-state">正在检查密钥状态…</span>
            <label class="check-line">
              <input id="clear-api-key" type="checkbox" />
              <span>清除已保存密钥</span>
            </label>
          </div>
        </div>
      </section>

      <details id="proxy-config" class="settings-group disclosure">
        <summary>
          <span class="summary-copy">
            <strong>网络代理</strong>
            <small id="proxy-secret-state">代理未启用</small>
          </span>
          <span class="chevron" aria-hidden="true"></span>
        </summary>
        <div class="group-body proxy-body">
          <label class="switch-row">
            <span>
              <strong>使用代理</strong>
              <small>模型请求和宠物资源下载使用同一代理</small>
            </span>
            <input id="proxy-enabled" type="checkbox" role="switch" />
          </label>
          <label class="field">
            <span>代理地址</span>
            <input
              id="proxy-url"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="http://127.0.0.1:7890"
            />
            <small>支持 HTTP、HTTPS、SOCKS4 和 SOCKS5；本机地址自动直连。</small>
          </label>
        </div>
      </details>

      <section class="actions-section" aria-labelledby="actions-title">
        <div class="actions-heading">
          <div class="group-heading">
            <h2 id="actions-title">快捷动作</h2>
            <p>选中文字后按快捷键即可执行。展开动作可编辑 Prompt。</p>
          </div>
          <button id="add-action" class="secondary-button" type="button">新增动作</button>
        </div>
        <div id="action-list" class="action-list"></div>
      </section>

      <footer class="command-bar">
        <div id="form-status" class="form-status" role="status" aria-live="polite">尚未加载配置</div>
        <div class="command-buttons">
          <button id="test-button" class="secondary-button" type="button">测试连接</button>
          <button id="save-button" class="primary-button" type="button">保存</button>
        </div>
      </footer>
    </main>

    <template id="action-template">
      <article class="action-card">
        <button class="action-toggle" type="button" aria-expanded="false">
          <span class="action-index"></span>
          <span class="action-summary">
            <strong class="action-summary-name"></strong>
            <small class="shortcut-state"></small>
          </span>
          <kbd class="action-shortcut-preview"></kbd>
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <div class="action-body" hidden>
          <div class="action-fields">
            <label class="field action-name-field">
              <span>动作名称</span>
              <input class="action-name" type="text" maxlength="60" />
            </label>
            <label class="field shortcut-field">
              <span>全局快捷键</span>
              <input class="action-shortcut" type="text" readonly />
              <small>聚焦后直接按下新的组合键。</small>
            </label>
          </div>
          <label class="switch-row compact-switch">
            <span>
              <strong>自动复制结果</strong>
              <small>动作完成后写入系统剪贴板</small>
            </span>
            <input class="action-auto-copy" type="checkbox" role="switch" />
          </label>
          <label class="field prompt-field">
            <span>System Prompt</span>
            <textarea class="action-system-prompt" rows="4" maxlength="8000"></textarea>
          </label>
          <label class="field prompt-field">
            <span>User Prompt</span>
            <textarea class="action-user-prompt" rows="4" maxlength="8000"></textarea>
            <small>必须包含 <code>{{input}}</code>，用于放置选中的文本。</small>
          </label>
          <div class="action-footer">
            <button class="delete-action danger-button" type="button">删除动作</button>
          </div>
        </div>
      </article>
    </template>

    <script src="dist/settings.js"></script>
  </body>
</html>

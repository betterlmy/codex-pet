<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-pet AI 设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <header class="masthead">
        <div>
          <span class="kicker">CODEX-PET / SIGNAL CONFIGURATION</span>
          <h1>AI 信号设置</h1>
          <p>为每个 Prompt 动作分配独立快捷键，选中文本后即可直接发送。</p>
        </div>
        <span class="masthead-mark" aria-hidden="true">AI</span>
      </header>

      <section class="panel connection-panel" aria-labelledby="connection-title">
        <div class="section-heading">
          <span>01</span>
          <div>
            <h2 id="connection-title">模型连接</h2>
            <p>兼容 OpenAI Chat Completions 流式协议。</p>
          </div>
        </div>
        <div class="field-grid">
          <label class="field field-wide">
            <span>BASE URL</span>
            <input id="base-url" type="url" spellcheck="false" autocomplete="off" />
          </label>
          <label class="field">
            <span>MODEL</span>
            <input id="model" type="text" spellcheck="false" autocomplete="off" />
          </label>
          <label class="field">
            <span>API KEY</span>
            <input id="api-key" type="password" spellcheck="false" autocomplete="new-password" />
          </label>
        </div>
        <div class="secret-row">
          <span id="secret-state">正在检查密钥状态…</span>
          <label class="check-line"><input id="clear-api-key" type="checkbox" /> 清除已保存密钥</label>
        </div>
        <div id="proxy-config" class="proxy-config">
          <div class="proxy-heading">
            <div>
              <span class="proxy-label">FORWARD PROXY</span>
              <strong>前置代理</strong>
            </div>
            <label class="proxy-switch">
              <input id="proxy-enabled" type="checkbox" />
              <span>启用全应用代理</span>
            </label>
          </div>
          <label class="field">
            <span>代理地址</span>
            <input
              id="proxy-url"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="http://127.0.0.1:7890"
            />
            <small>支持 http://、https://、socks4://、socks5://；socks:// 按 SOCKS5 处理</small>
          </label>
          <div class="proxy-status-row">
            <span id="proxy-secret-state">代理未启用</span>
            <span>本机地址自动直连</span>
          </div>
        </div>
      </section>

      <section class="panel actions-panel" aria-labelledby="actions-title">
        <div class="section-heading actions-heading">
          <span>02</span>
          <div>
            <h2 id="actions-title">Prompt 动作</h2>
            <p>User Prompt 必须包含 <code>{{input}}</code>，用于放置选中文本。</p>
          </div>
          <button id="add-action" class="secondary-button" type="button">新增动作</button>
        </div>
        <div id="action-list" class="action-list"></div>
      </section>

      <footer class="command-bar">
        <div id="form-status" class="form-status" role="status">尚未加载配置</div>
        <div class="command-buttons">
          <button id="test-button" class="secondary-button" type="button">测试已保存配置</button>
          <button id="save-button" class="primary-button" type="button">保存并注册快捷键</button>
        </div>
      </footer>
    </main>

    <template id="action-template">
      <article class="action-card">
        <header class="action-card-header">
          <span class="action-index"></span>
          <label class="field action-name-field">
            <span>动作名称</span>
            <input class="action-name" type="text" maxlength="60" />
          </label>
          <button class="delete-action danger-button" type="button">删除</button>
        </header>
        <div class="action-meta">
          <label class="field shortcut-field">
            <span>全局快捷键</span>
            <input class="action-shortcut" type="text" readonly />
            <small>聚焦后直接按下新的组合键</small>
          </label>
          <label class="check-card">
            <input class="action-auto-copy" type="checkbox" />
            <span>完成后自动复制结果</span>
          </label>
          <span class="shortcut-state"></span>
        </div>
        <label class="field prompt-field">
          <span>SYSTEM PROMPT</span>
          <textarea class="action-system-prompt" rows="5" maxlength="8000"></textarea>
        </label>
        <label class="field prompt-field">
          <span>USER PROMPT</span>
          <textarea class="action-user-prompt" rows="4" maxlength="8000"></textarea>
        </label>
      </article>
    </template>

    <script src="dist/settings.js"></script>
  </body>
</html>

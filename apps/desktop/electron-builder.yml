appId: app.codexpet.desktop
productName: codex-pet
asar: true
compression: maximum

directories:
  output: ../../artifacts
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - index.html
  - styles.css
  - bubble.html
  - bubble.css
  - settings.html
  - settings.css
  - package.json

mac:
  icon: build/icon.svg
  category: public.app-category.utilities
  identity: null
  extendInfo:
    LSUIElement: true
  artifactName: codex-pet-macos-${arch}-${version}.${ext}
  extraResources:
    - from: ../../target/release/codex-pet-runtime
      to: bin/codex-pet-runtime
    - from: ../../LICENSE
      to: LICENSE
    - from: ../../NOTICE.md
      to: NOTICE.md
  target:
    - target: dmg
      arch:
        - arm64

win:
  icon: build/icon.svg
  signExecutable: false
  artifactName: codex-pet-portable-x64-${version}.${ext}
  extraResources:
    - from: ../../target/release/codex-pet-runtime.exe
      to: bin/codex-pet-runtime.exe
    - from: ../../LICENSE
      to: LICENSE
    - from: ../../NOTICE.md
      to: NOTICE.md
  target:
    - target: portable
      arch:
        - x64

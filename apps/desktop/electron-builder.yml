appId: app.codexpet.desktop
productName: codex-pet
asar: true
compression: maximum

directories:
  output: ../../artifacts
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - index.html
  - styles.css
  - bubble.html
  - bubble.css
  - settings.html
  - settings.css
  - package.json

extraResources:
  - from: ../../target/release/codex-pet-runtime.exe
    to: bin/codex-pet-runtime.exe
  - from: ../../LICENSE
    to: LICENSE
  - from: ../../NOTICE.md
    to: NOTICE.md

artifactName: codex-pet-portable-x64-${version}.${ext}

win:
  icon: build/icon.svg
  signExecutable: false
  target:
    - target: portable
      arch:
        - x64
